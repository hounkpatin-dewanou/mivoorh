# MivooRH — docker compose up --build
# Config API : backend/.env.docker (copié en .env au démarrage)
# App : http://localhost:8002  |  API : http://localhost:8002/api

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mivoorh_root
      MYSQL_DATABASE: mivoorh
      MYSQL_USER: mivoorh
      MYSQL_PASSWORD: mivoorh
    volumes:
      - mivoorh_db:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-u', 'root', '-pmivoorh_root']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    # Surcharges optionnelles (prioritaires sur .env.docker) — ex. production :
    # environment:
    #   APP_URL: https://mivoorh.kladriva.com
    #   FRONTEND_URL: https://mivoorh.kladriva.com
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '8000'
    volumes:
      - api_storage:/var/www/html/storage
      - api_cache:/var/www/html/bootstrap/cache

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - '8002:80'
    depends_on:
      - api

volumes:
  mivoorh_db:
  api_storage:
  api_cache:
