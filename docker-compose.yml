# MivooRH — démarrage en une commande : docker compose up --build
# Application : http://localhost:8001  |  API (proxy) : http://localhost:8001/api

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mivoorh_root
      MYSQL_DATABASE: mivoorh
      MYSQL_USER: mivoorh
      MYSQL_PASSWORD: mivoorh
    volumes:
      - mivoorh_db:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-u', 'root', '-pmivoorh_root']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      APP_NAME: MivooRH
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8001
      APP_KEY: base64:qB5+7Q+ME8Cjd1vKTzrFsv1pxwhn6lutJsLsHIIjW5I=
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: '3306'
      DB_DATABASE: mivoorh
      DB_USERNAME: mivoorh
      DB_PASSWORD: mivoorh
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FRONTEND_URL: http://localhost:8001
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:8001,127.0.0.1,127.0.0.1:8001
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '8000'
    volumes:
      - api_storage:/var/www/html/storage
      - api_cache:/var/www/html/bootstrap/cache

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - '8001:80'
    depends_on:
      - api

volumes:
  mivoorh_db:
  api_storage:
  api_cache:
